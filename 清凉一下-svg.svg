<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="100%" height="100%">
  <defs>
    <linearGradient id="baseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eeeeee" />
      <stop offset="100%" stop-color="#cccccc" />
    </linearGradient>
    
    <linearGradient id="standGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#dddddd" />
      <stop offset="50%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#bbbbbb" />
    </linearGradient>

    <path id="blade" d="M200,190 C150,90 110,50 200,40 C290,50 250,90 200,190" fill="#4facfe" opacity="0.85"/>
  </defs>

  <style>
    /* 定义旋转动画 */
    .blade-spin {
      animation: spin linear infinite;
      transform-origin: 200px 190px;
    }
    
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
    
    /* 按钮交互样式 */
    .btn {
      cursor: pointer;
      transition: fill 0.2s, transform 0.1s;
    }
    
    .btn:hover {
      fill: #a0d8ef;
    }

    .btn:active {
      transform: scale(0.95);
    }
    
    .btn-text {
      pointer-events: none;
      font-family: Arial, sans-serif;
      font-size: 14px;
      font-weight: bold;
      fill: #444;
      text-anchor: middle;
      dominant-baseline: central;
    }
  </style>

  <rect width="400" height="500" fill="#f8f9fa" rx="15"/>

  <rect x="185" y="250" width="30" height="160" fill="url(#standGrad)" rx="5"/>
  <path d="M 185,250 L 215,250 L 225,190 L 175,190 Z" fill="#dddddd" />

  <path d="M120,430 L280,430 Q330,430 340,470 L60,470 Q70,430 120,430" fill="url(#baseGrad)" stroke="#bbb" stroke-width="2"/>
  <rect x="60" y="470" width="280" height="10" fill="#aaa" rx="5"/>

  <circle cx="200" cy="190" r="45" fill="#cccccc" stroke="#aaaaaa" stroke-width="2"/>

  <circle cx="200" cy="190" r="140" fill="none" stroke="#e0e0e0" stroke-width="3" />
  <circle cx="200" cy="190" r="110" fill="none" stroke="#e0e0e0" stroke-width="2" />
  <circle cx="200" cy="190" r="80" fill="none" stroke="#e0e0e0" stroke-width="2" />

  <g id="blades" class="blade-spin" style="animation-duration: 0s;">
    <use href="#blade" />
    <use href="#blade" transform="rotate(120 200 190)" />
    <use href="#blade" transform="rotate(240 200 190)" />
    <circle cx="200" cy="190" r="18" fill="#ffffff" stroke="#4facfe" stroke-width="3"/>
  </g>

  <g stroke="#d5d5d5" stroke-width="3">
    <line x1="200" y1="50" x2="200" y2="330" />
    <line x1="60" y1="190" x2="340" y2="190" />
    <line x1="101" y1="91" x2="299" y2="289" />
    <line x1="101" y1="289" x2="299" y2="91" />
  </g>
  <circle cx="200" cy="190" r="25" fill="#f4f4f9" stroke="#d5d5d5" stroke-width="3"/>
  <circle cx="200" cy="190" r="15" fill="#d5d5d5" />

  <rect x="110" y="440" width="180" height="30" fill="#dddddd" rx="15"/>

  <g transform="translate(130, 455)" onclick="setSpeed(0)">
    <circle id="btn0" class="btn" cx="0" cy="0" r="12" fill="#ff6b6b" />
    <text class="btn-text">0</text>
  </g>

  <g transform="translate(175, 455)" onclick="setSpeed(1)">
    <circle id="btn1" class="btn" cx="0" cy="0" r="12" fill="#ffffff" />
    <text class="btn-text">1</text>
  </g>

  <g transform="translate(220, 455)" onclick="setSpeed(2)">
    <circle id="btn2" class="btn" cx="0" cy="0" r="12" fill="#ffffff" />
    <text class="btn-text">2</text>
  </g>

  <g transform="translate(265, 455)" onclick="setSpeed(3)">
    <circle id="btn3" class="btn" cx="0" cy="0" r="12" fill="#ffffff" />
    <text class="btn-text">3</text>
  </g>

  <script type="text/javascript">
    // <![CDATA[
    function setSpeed(speed) {
      const blades = document.getElementById('blades');
      const buttons = [
        document.getElementById('btn0'),
        document.getElementById('btn1'),
        document.getElementById('btn2'),
        document.getElementById('btn3')
      ];

      // 重置所有按钮颜色
      buttons.forEach(btn => btn.setAttribute('fill', '#ffffff'));

      // 设置对应档位的速度与高亮颜色
      if (speed === 0) {
        blades.style.animationDuration = '0s';
        buttons[0].setAttribute('fill', '#ff6b6b'); // 红色代表关闭
      } else if (speed === 1) {
        blades.style.animationDuration = '1.2s';
        buttons[1].setAttribute('fill', '#4facfe'); // 蓝色代表开启
      } else if (speed === 2) {
        blades.style.animationDuration = '0.6s';
        buttons[2].setAttribute('fill', '#4facfe');
      } else if (speed === 3) {
        blades.style.animationDuration = '0.2s';
        buttons[3].setAttribute('fill', '#4facfe');
      }
    }
    // ]]>
  </script>
</svg>
